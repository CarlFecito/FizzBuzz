<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div>
            <button onclick="getNumber()">Start!</button>
        </div>
        <div class="output">

        </div>
        <script>
            function getNumber() {
                let finalStr = ''
                let inputNumber = parseInt(prompt(`Enter a number`, ` `))
                
                for (let i = 1; i <= inputNumber; i++) {
                    if (i % 15 ===0) {
                        finalStr = finalStr + `FizzBuzz, `
                    } else if (i % 3 === 0) {
                        finalStr = finalStr + `Fizz, `
                    } else if (i % 5 === 0) {
                        finalStr = finalStr + `Buzz, `
                    } else {
                        finalStr = finalStr + i + ', '
                    }
                }
                alert(finalStr)
            }
        </script>
    </div>
</body>
</html>
